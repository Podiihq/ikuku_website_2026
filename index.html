<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>i-kuku</title>
  <style>
    html,
    body {
      margin: 0;
      background: #f8f0d8;
    }

    body {
      overflow-x: hidden;
    }

    #boot-loader {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 24px;
      background: #f8f0d8;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .boot-loader__content {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      max-width: 576px;
      flex-direction: column;
      align-items: center;
    }

    .boot-loader__logo {
      width: auto;
      height: 160px;
    }

    .boot-loader__panel {
      width: 100%;
      box-sizing: border-box;
      margin-top: 32px;
      padding: 24px;
      border: 2px solid #0a0a0a;
      border-radius: 28px;
      background: rgba(255, 253, 245, 0.94);
      box-shadow: 10px 10px 0 #0a0a0a;
    }

    .boot-loader__details {
      display: flex;
      width: 100%;
      align-items: flex-end;
      justify-content: space-between;
    }

    .boot-loader__label {
      margin: 0;
      color: #0a0a0a;
      font-size: 24px;
      font-weight: 700;
    }

    .boot-loader__count {
      margin: 0;
      color: #0a0a0a;
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
    }

    .boot-loader__count span {
      margin-left: 4px;
      font-size: 24px;
    }

    .boot-loader__track {
      width: 100%;
      height: 18px;
      margin-top: 22px;
      overflow: hidden;
      box-sizing: border-box;
      border: 2px solid #0a0a0a;
      border-radius: 999px;
      background: #fff;
    }

    .boot-loader__bar {
      width: 22%;
      height: 100%;
      border-radius: inherit;
      background: repeating-linear-gradient(
        -45deg,
        #697b3b,
        #697b3b 10px,
        #819650 10px,
        #819650 20px
      );
      animation: boot-progress 1.1s ease-in-out infinite alternate;
      transform-origin: left;
    }

    .boot-loader__message {
      margin: 16px 0 0;
      color: #697b3b;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @keyframes boot-progress {
      from {
        transform: scaleX(0.15);
      }

      to {
        transform: scaleX(1);
      }
    }

    @media (max-width: 640px) {
      .boot-loader__logo {
        height: 128px;
      }

      .boot-loader__panel {
        padding: 20px;
      }

      .boot-loader__label {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div id="boot-loader" role="status" aria-label="Loading website">
    <div class="boot-loader__content">
      <img
        class="boot-loader__logo"
        src="/src/assets/images/logo/i-kuku-logo.svg"
        alt="I-kuku"
      />
      <div class="boot-loader__panel">
        <div class="boot-loader__details">
          <p class="boot-loader__label">Loading website</p>
          <p class="boot-loader__count">0<span>%</span></p>
        </div>
        <div class="boot-loader__track" aria-hidden="true">
          <div class="boot-loader__bar"></div>
        </div>
        <p class="boot-loader__message">Preparing your experience</p>
      </div>
    </div>
  </div>
  <div id="root" style="visibility: hidden"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
